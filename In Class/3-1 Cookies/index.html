<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theme Manager</title>
<style>
    .light-mode {
        background-color: white;
        color: black;
    }

    .dark-mode {
        background-color: black;
        color: white;
    }

    .dark-mode h2 {
        color: white;
    }

    .light-mode h2 {
        color: black;
    }
</style>
</head>
<body>

<h2>Theme Manager</h2>

<button id = "darkModeBtn">Dark Mode</button>
<button id = "lightModeBtn">Light Mode</button>

<!-- IMPORTANT: type="module" -->
<script type="module" src="script.js"></script>

</body>
</html>
