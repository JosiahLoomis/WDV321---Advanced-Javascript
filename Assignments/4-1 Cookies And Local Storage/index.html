<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDV321 Advanced JavaScript</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color:burlywood;
        }
        #container {
            width:70%;
            margin-left:auto;
            margin-right:auto;
            padding-left:15px;
            padding-right:15px;
            background-color: chocolate;
        }

        header {
            text-align: center;
        }

        nav {
            display:flex;
            justify-content: space-between;
            margin-bottom:15px;
        }

        main {
            display:flex;
        }

        main section {
            width:50%;
            border:thin solid black;

        }

        section h2, section h3 {
            text-align: center;
        }

        form {
            width: 70%;
            margin-left:auto;
            margin-right:auto;
        }


        footer p {
            text-align: center;
        }
    </style>
    <script type="module">
        import * as utils from "./helperFunctions.js";
        //Instructions:
        //1. Create a JavaScript object called eventRegistration.  This object will hold one or more registrations
        //  each registration will have a name, email, phone and registration date (use the current date)
        //
        //2. Create a hit counter that will record each time somebody comes to this page.  Store the hit counter in a cookie.
        //  Each time somebody comes to this page display the current value of the hit counter next to "Current Activity:"

        //Sign In button:
        //When the sign in form is clicked the following will happen
        //  a. Somewhere on the page display a form to accept the username and password.  Use one of methods we reviewed
        //      to dynamically display the form when needed.
        //  b. When that form is selected compare the input to the contents of the membersInfo object.
        //  c. If you find a match in the membersInfo object create a cookie called authorizedUser with the username as its value.

        let membersInfo = {
            memberUserNames: [
                "A1D2C4",
                "B2D4C6",
                "B3C2D1"
            ]
        }

        document.addEventListener("DOMContentLoaded", () => {

            //==================== Event Form ====================
            const eventRegistration = JSON.parse(localStorage.getItem("eventRegistration")) || [];

            document.getElementById("eventForm").addEventListener("submit", (value) => {
                value.preventDefault(); //Makes the form not reset the page
                const formData = new FormData(value.target);

                const registration = {
                    name: formData.get("name"),
                    email: formData.get("email"),
                    phone: formData.get("phone"),
                    registrationDate: new Date()
                };

                eventRegistration.push(registration);
                localStorage.setItem("eventRegistration", JSON.stringify(eventRegistration));

                value.target.reset();
            });

            //==================== Hit Counter ====================
            const hitCounter = (Number(utils.getCookie("hitCounter")) || 0) + 1;
            utils.setCookie("hitCounter", hitCounter, 7);
            document.getElementById("hitCounterDisplay").textContent = hitCounter;

            //==================== Sign In Button ====================
            const signInButton = document.getElementById("signIn");
            const navDiv = document.querySelector("nav");

            signInButton.addEventListener("click", () => {
                if (document.getElementById("signInForm")) {
                    return;
                }

                //Adds Form
                const signInFormHTML = `
                    <div id="signInForm" style="position: absolute; background: white; border: 2px solid #333; padding: 20px; margin-top: 10px; border-radius: 5px;">
                    <h3>Member Sign In</h3>
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                    <br><br>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                    <br><br>
                    <button type="button" id="signInSubmit">Submit</button>
                    <button type="button" id="signInCancel">Cancel</button>
                    </div>
                 `;

                navDiv.insertAdjacentHTML("beforeend", signInFormHTML);

                //Handle Submit
                document.getElementById("signInSubmit").addEventListener("click", () => {
                    const username = document.getElementById("username").value;
                    const password = document.getElementById("password").value;

                    if (membersInfo.memberUserNames.includes(username)) {
                        utils.setCookie("authorizedUser", username, 7);
                        alert("Sign in successful!");
                        
                        signInButton.textContent = `Signed in as: ${username}`;
                        signInButton.disabled = true;
                        
                        document.getElementById("signInForm").remove();
                    } else {
                        alert("Invalid username or password");
                    }
                });

                //Handle Cancel
                document.getElementById("signInCancel").addEventListener("click", () => {
                    document.getElementById("signInForm").remove();
                });
            });

            //Checks if signed in on page load
            const authorizedUser = utils.getCookie("authorizedUser");
            if (authorizedUser) {
                signInButton.textContent = `Signed in as: ${authorizedUser}`;
                signInButton.disabled = true;
            }
        });
    </script>
</head>
<body>
    <div id="container">
        <header>
            <h1>Science Fiction Book Club</h1>
            <h2>"Predicting the future using or describing the future?"</h2>
        </header>

        <nav>
            <div>
                <a href="index.html"><button>Home Page</button></a>
                <a href="members.html"><button>Members Page</button></a>
            </div>
            <button id="signIn">Sign In</button>
        </nav>

        <main>
            <section class="leftColumn">
                <h3>Sign Up for our next Public Event</h3>
                <form method="post" action="#" id="eventForm">
                    <fieldset>
                        <p>Event Registration Form</p>
                        <!--<h4>Form Instructions:</h4>
                        <ol>
                            <li>Create fields for Name, Email, Phone</li>
                            <li>Include validation</li>
                            <li>When the form is submitted capture the form data and add it to the eventRegistration object.</li>
                            <li>Store the eventRegistration object in local storage</li>
                        </ol>-->
                        <div>
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="name" required minlength="2">
                        </div>

                        <div>
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div>
                            <label for="phone">Phone:</label>
                            <input type="text" id="phone" name="phone" required pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="123-456-7890">
                        </div>

                        <div>
                            <button type="submit">Submit</button>
                            <button type="reset">Clear</button>
                        </div>
                    </fieldset>
                </form>
            </section>
            <section class="rightColumn">
                <h3>Upcoming Events</h3>
                <div>
                    <h3>"Did Star Trek predict AI?"</h3>
                </div>
            </section>
        </main>

        <footer>
            <p>Copyright &copy;YYYY All rights reserved.</p>
            <p>Current Activity: <span id="hitCounterDisplay"></span></p>
        </footer>

    </div>
</body>
</html>
